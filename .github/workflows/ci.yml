- name: Write dbt profiles
        run: |
          python - <<'EOF'
          import os
          os.makedirs(os.path.expanduser('~/.dbt'), exist_ok=True)
          profile = """ecommerce_dbt:
            target: ci
            outputs:
              ci:
                type: postgres
                host: localhost
                user: postgres
                password: password
                port: 5432
                dbname: ecommerce_test
                schema: dbt_ci
                threads: 2
          """
          with open(os.path.expanduser('~/.dbt/profiles.yml'), 'w') as f:
              f.write(profile)
          print("profiles.yml written successfully")
          EOF