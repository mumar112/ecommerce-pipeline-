name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ecommerce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 ingestion/ tests/ --max-line-length=100 --ignore=E501

      - name: Run Python tests
        run: python -m pytest tests/ -v --tb=long

      - name: Install dbt
        run: pip install dbt-postgres

      - name: Write dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          ecommerce_dbt:
            target: ci
            outputs:
              ci:
                type: postgres
                host: localhost
                user: postgres
                password: password
                port: 5432
                dbname: ecommerce_test
                schema: dbt_ci
                threads: 2
          EOF

      - name: Run dbt
        run: |
          cd dbt_project/ecommerce_dbt
          dbt deps
          dbt run
          dbt test